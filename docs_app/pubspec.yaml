name: docs_app
description: Documentation site for the flow CLI.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  go_router: ^14.6.0
  google_fonts: ^6.2.1
  markdown_widget: ^2.3.2+8
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/docs/
    - assets/docs/flavor/
    - assets/docs/deploy/
    - assets/docs/config/
    - assets/docs/workflows/
