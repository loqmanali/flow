name: flow_studio
description: Flutter Desktop GUI for the flow CLI — point-and-click flavors and deployment.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # The flow engine — same business logic as the CLI, imported directly.
  flow:
    path: ../

  flutter_riverpod: ^3.1.0
  file_selector: ^1.0.3
  yaml: ^3.1.2

  widget_kit:
    git:
      url: https://github.com/loqmanali/flutter_kits.git
      path: widget_kit
      ref: v1.1.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
